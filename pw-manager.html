<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Pass Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5;
            display: flex; justify-content: center;
            padding: 30px 0 60px; min-height: 100vh; margin: 0;
        }
        .container { width: 350px; }

        /* ===== ロック画面 ===== */
        #lock-screen {
            position: fixed; inset: 0;
            background: rgba(15, 20, 30, 0.97);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 999;
        }
        .lock-icon { font-size: 3em; margin-bottom: 10px; }
        #lock-screen h1 { color: #fff; font-size: 1.1em; margin-bottom: 30px; letter-spacing: 0.05em; }
        .pin-dots { display: flex; gap: 14px; margin-bottom: 30px; }
        .pin-dot {
            width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid #555; background: transparent; transition: background 0.15s;
        }
        .pin-dot.filled { background: #00ffc8; border-color: #00ffc8; }
        .numpad { display: grid; grid-template-columns: repeat(3, 70px); gap: 12px; }
        .num-btn {
            height: 70px; border-radius: 50%; border: none;
            background: #1e2530; color: #fff;
            font-size: 1.4em; font-weight: bold; cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .num-btn:hover { background: #2d3748; }
        .num-btn:active { transform: scale(0.93); }
        .num-btn.clear { font-size: 0.85em; color: #aaa; }
        .num-btn.empty { background: transparent; cursor: default; pointer-events: none; }
        .pin-error { color: #ff6b6b; font-size: 0.85em; height: 20px; margin-bottom: 12px; text-align: center; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-8px); }
            40%,80% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* ===== ヘッダー ===== */
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .app-title { font-size: 1.0em; font-weight: bold; color: #555; }
        .header-btns { display: flex; gap: 8px; }
        .icon-btn {
            background: none; border: 1px solid #dee2e6; border-radius: 8px;
            padding: 5px 10px; font-size: 0.85em; cursor: pointer; color: #6c757d; transition: all 0.2s;
        }
        .icon-btn:hover { background: #e9ecef; }
        .icon-btn.danger:hover { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }

        /* ===== カード ===== */
        .card {
            background: white; padding: 16px 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 14px;
            border-left: 6px solid #ccc; transition: box-shadow 0.2s, transform 0.2s;
        }
        .card.dragging { opacity: 0.45; transform: scale(0.97); }
        .card.drag-over { box-shadow: 0 0 0 2px #00ffc8, 0 4px 15px rgba(0,0,0,0.08); }
        .card-header { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
        .drag-handle { color: #ccc; cursor: grab; font-size: 1.1em; padding: 0 2px; user-select: none; flex-shrink: 0; }
        .drag-handle:active { cursor: grabbing; }
        .card-title { font-weight: bold; color: #333; flex: 1; font-size: 1.05em; }
        .card-actions { display: flex; gap: 2px; }
        .card-btn {
            background: none; border: none; cursor: pointer;
            font-size: 0.9em; padding: 3px 6px; border-radius: 6px;
            color: #bbb; transition: all 0.15s;
        }
        .card-btn:hover { background: #f0f0f0; color: #555; }
        .card-btn.del:hover { background: #f8d7da; color: #c0392b; }
        .label { font-size: 0.75em; color: #6c757d; margin-bottom: 5px; font-weight: bold; }
        .code-box {
            background-color: #212529; color: #00ffc8;
            padding: 10px 12px; border-radius: 6px;
            font-family: 'Consolas', monospace; cursor: pointer;
            transition: all 0.2s; font-size: 0.9em; word-break: break-all;
        }
        .code-box:hover { background-color: #343a40; }

        /* ===== 編集エリア ===== */
        .edit-area { margin-top: 12px; border-top: 1px solid #f0f0f0; padding-top: 12px; }
        .edit-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .edit-label { font-size: 0.72em; color: #6c757d; width: 58px; flex-shrink: 0; font-weight: bold; }
        .edit-input {
            flex: 1; border: 1px solid #dee2e6; border-radius: 6px;
            padding: 6px 10px; font-size: 0.88em; outline: none; transition: border-color 0.2s;
        }
        .edit-input:focus { border-color: #00ffc8; }
        .color-options { display: flex; gap: 6px; flex-wrap: wrap; }
        .color-dot {
            width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.selected { border-color: #333; transform: scale(1.15); }
        .edit-save-btn {
            width: 100%; padding: 8px; background: #212529; color: #00ffc8;
            border: none; border-radius: 6px; cursor: pointer;
            font-size: 0.9em; font-weight: bold; transition: background 0.2s; margin-top: 4px;
        }
        .edit-save-btn:hover { background: #343a40; }

        /* ===== 追加ボタン ===== */
        .add-btn {
            width: 100%; padding: 14px; background: white;
            border: 2px dashed #dee2e6; border-radius: 12px;
            cursor: pointer; color: #bbb; font-size: 1em; transition: all 0.2s; box-sizing: border-box;
        }
        .add-btn:hover { border-color: #00ffc8; color: #00a884; background: #f8fffd; }

        /* ===== PIN変更モーダル ===== */
        #pin-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 500;
            align-items: center; justify-content: center;
        }
        #pin-modal.show { display: flex; }
        .modal-box {
            background: white; border-radius: 16px; padding: 28px;
            width: 270px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-box h3 { margin: 0 0 18px; font-size: 1em; color: #333; }
        .modal-input {
            width: 100%; box-sizing: border-box; border: 1px solid #dee2e6;
            border-radius: 8px; padding: 10px 12px; font-size: 1em;
            margin-bottom: 10px; outline: none; transition: border-color 0.2s;
        }
        .modal-input:focus { border-color: #00ffc8; }
        .modal-error { color: #ff6b6b; font-size: 0.8em; margin-bottom: 10px; min-height: 18px; }
        .modal-btns { display: flex; gap: 8px; }
        .modal-btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.9em; font-weight: bold; transition: background 0.2s;
        }
        .modal-btn.primary { background: #212529; color: #00ffc8; }
        .modal-btn.primary:hover { background: #343a40; }
        .modal-btn.secondary { background: #f0f0f0; color: #555; }
        .modal-btn.secondary:hover { background: #e0e0e0; }

        /* ===== トースト ===== */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 10px 25px; border-radius: 50px;
            font-size: 0.9em; opacity: 0; visibility: hidden;
            transition: all 0.4s ease; z-index: 1000;
        }
        .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(10px); }
    </style>
</head>
<body>

<!-- ロック画面 -->
<div id="lock-screen">
    <div class="lock-icon">🔒</div>
    <h1>PINを入力してください</h1>
    <div class="pin-dots" id="pin-dots"></div>
    <div class="pin-error" id="pin-error"></div>
    <div class="numpad">
        <button class="num-btn" onclick="inputPin('1')">1</button>
        <button class="num-btn" onclick="inputPin('2')">2</button>
        <button class="num-btn" onclick="inputPin('3')">3</button>
        <button class="num-btn" onclick="inputPin('4')">4</button>
        <button class="num-btn" onclick="inputPin('5')">5</button>
        <button class="num-btn" onclick="inputPin('6')">6</button>
        <button class="num-btn" onclick="inputPin('7')">7</button>
        <button class="num-btn" onclick="inputPin('8')">8</button>
        <button class="num-btn" onclick="inputPin('9')">9</button>
        <button class="num-btn empty"></button>
        <button class="num-btn" onclick="inputPin('0')">0</button>
        <button class="num-btn clear" onclick="clearPin()">⌫</button>
    </div>
</div>

<!-- PIN変更モーダル -->
<div id="pin-modal">
    <div class="modal-box">
        <h3>🔑 PINを変更</h3>
        <input class="modal-input" id="pin-new" type="password" placeholder="新しいPIN（4桁以上・数字のみ）" maxlength="8">
        <input class="modal-input" id="pin-confirm" type="password" placeholder="確認のため再入力">
        <div class="modal-error" id="pin-modal-error"></div>
        <div class="modal-btns">
            <button class="modal-btn secondary" onclick="closePinModal()">キャンセル</button>
            <button class="modal-btn primary" onclick="savePin()">変更する</button>
        </div>
    </div>
</div>

<!-- トースト -->
<div id="toast" class="toast"></div>

<!-- メイン -->
<div class="container">
    <div class="app-header">
        <div class="app-title">🗝️ My Pass Manager</div>
        <div class="header-btns">
            <button class="icon-btn" onclick="openPinModal()">🔑 PIN変更</button>
            <button class="icon-btn danger" onclick="lock()">🔒 ロック</button>
        </div>
    </div>
    <div id="cards-container"></div>
    <button class="add-btn" onclick="addEntry()">＋ 新規追加</button>
</div>

<script>
// ==========================================
// 【初期設定】初回起動時のデフォルト値
// ==========================================
const DEFAULTS = {
    pin: "1234",
    entries: [
        { id: "sap",     name: "SAP",     password: "********", color: "#0071c5" },
        { id: "mysns",    name: "MySNS",    password: "********",          color: "#28a745" },
        { id: "outlook", name: "Outlook", password: "********",  color: "#0078d4" }
    ]
};

const COLORS = ["#0071c5","#28a745","#0078d4","#e74c3c","#9b59b6","#e67e22","#1abc9c","#f39c12","#34495e","#c0392b"];

// ===== データ管理 =====
function loadData() {
    try {
        const saved = localStorage.getItem('passManagerData');
        return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULTS));
    } catch { return JSON.parse(JSON.stringify(DEFAULTS)); }
}
function saveData() {
    localStorage.setItem('passManagerData', JSON.stringify(appData));
}
let appData = loadData();

// ===== PINロック =====
let currentPin = "";

function buildDots() {
    const el = document.getElementById('pin-dots');
    el.innerHTML = '';
    for (let i = 0; i < appData.pin.length; i++) {
        const d = document.createElement('div');
        d.className = 'pin-dot';
        d.id = `dot-${i}`;
        el.appendChild(d);
    }
}

function inputPin(digit) {
    if (currentPin.length >= appData.pin.length) return;
    currentPin += digit;
    updateDots();
    if (currentPin.length === appData.pin.length) setTimeout(checkPin, 100);
}

function clearPin() {
    currentPin = currentPin.slice(0, -1);
    updateDots();
    document.getElementById('pin-error').innerText = "";
}

function updateDots() {
    for (let i = 0; i < appData.pin.length; i++) {
        const d = document.getElementById(`dot-${i}`);
        if (d) d.classList.toggle('filled', i < currentPin.length);
    }
}

function checkPin() {
    if (currentPin === appData.pin) {
        document.getElementById('lock-screen').style.display = 'none';
    } else {
        const dots = document.getElementById('pin-dots');
        dots.classList.add('shake');
        setTimeout(() => dots.classList.remove('shake'), 400);
        document.getElementById('pin-error').innerText = "PINが違います";
        currentPin = "";
        updateDots();
    }
}

function lock() {
    currentPin = "";
    buildDots();
    document.getElementById('pin-error').innerText = "";
    document.getElementById('lock-screen').style.display = 'flex';
}

document.addEventListener('keydown', (e) => {
    if (document.getElementById('lock-screen').style.display === 'none') return;
    if (e.key >= '0' && e.key <= '9') inputPin(e.key);
    if (e.key === 'Backspace') clearPin();
});

// ===== PIN変更 =====
function openPinModal() {
    document.getElementById('pin-new').value = '';
    document.getElementById('pin-confirm').value = '';
    document.getElementById('pin-modal-error').innerText = '';
    document.getElementById('pin-modal').classList.add('show');
    document.getElementById('pin-new').focus();
}
function closePinModal() {
    document.getElementById('pin-modal').classList.remove('show');
}
function savePin() {
    const newPin  = document.getElementById('pin-new').value;
    const confirm = document.getElementById('pin-confirm').value;
    const errEl   = document.getElementById('pin-modal-error');
    if (!/^\d+$/.test(newPin) || newPin.length < 4) { errEl.innerText = "4桁以上の数字で設定してください"; return; }
    if (newPin !== confirm) { errEl.innerText = "PINが一致しません"; return; }
    appData.pin = newPin;
    saveData();
    closePinModal();
    buildDots();
    showToast("PINを変更しました");
}

// ===== カード描画 =====
function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCards() {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';
    appData.entries.forEach((entry, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id    = entry.id;
        card.dataset.index = index;
        card.draggable = true;
        card.style.borderLeftColor = entry.color;
        card.innerHTML = `
            <div class="card-header">
                <span class="drag-handle" title="ドラッグで並べ替え">⠿</span>
                <span class="card-title">${esc(entry.name)}</span>
                <div class="card-actions">
                    <button class="card-btn" onclick="toggleEdit('${entry.id}')" title="編集">✏️</button>
                    <button class="card-btn del" onclick="deleteEntry('${entry.id}')" title="削除">🗑️</button>
                </div>
            </div>
            <div class="label">Password</div>
            <div class="code-box" onclick="copyPassword('${entry.id}')">${esc(entry.password)}</div>
            <div class="edit-area" id="edit-${entry.id}" style="display:none;">
                <div class="edit-row">
                    <span class="edit-label">サービス名</span>
                    <input class="edit-input" id="edit-name-${entry.id}" type="text" value="${esc(entry.name)}">
                </div>
                <div class="edit-row">
                    <span class="edit-label">パスワード</span>
                    <input class="edit-input" id="edit-pw-${entry.id}" type="text" value="${esc(entry.password)}">
                </div>
                <div class="edit-row">
                    <span class="edit-label">カラー</span>
                    <div class="color-options" id="color-opts-${entry.id}">
                        ${COLORS.map(c => `<div class="color-dot${c===entry.color?' selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor('${entry.id}',this)"></div>`).join('')}
                    </div>
                </div>
                <button class="edit-save-btn" onclick="saveEntry('${entry.id}')">💾 保存</button>
            </div>
        `;
        container.appendChild(card);
    });
    initDragAndDrop();
}

// ===== 編集・追加・削除 =====
function toggleEdit(id) {
    const el = document.getElementById(`edit-${id}`);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function selectColor(id, el) {
    document.querySelectorAll(`#color-opts-${id} .color-dot`).forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
}

function saveEntry(id) {
    const entry = appData.entries.find(e => e.id === id);
    if (!entry) return;
    const name  = document.getElementById(`edit-name-${id}`).value.trim();
    const pw    = document.getElementById(`edit-pw-${id}`).value;
    const selC  = document.querySelector(`#color-opts-${id} .color-dot.selected`);
    if (!name) { showToast("サービス名を入力してください"); return; }
    entry.name     = name;
    entry.password = pw;
    if (selC) entry.color = selC.dataset.color;
    saveData();
    renderCards();
    showToast("保存しました ✓");
}

function addEntry() {
    const id = 'e' + Date.now();
    appData.entries.push({ id, name: "新規サービス", password: "", color: COLORS[0] });
    saveData();
    renderCards();
    setTimeout(() => {
        toggleEdit(id);
        document.getElementById(`edit-name-${id}`).select();
    }, 30);
}

function deleteEntry(id) {
    const entry = appData.entries.find(e => e.id === id);
    if (!entry || !confirm(`「${entry.name}」を削除しますか？`)) return;
    appData.entries = appData.entries.filter(e => e.id !== id);
    saveData();
    renderCards();
    showToast("削除しました");
}

// ===== ドラッグ＆ドロップ =====
let dragSrcIndex = null;

function initDragAndDrop() {
    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('dragstart', e => {
            dragSrcIndex = parseInt(card.dataset.index);
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
            document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
        });
        card.addEventListener('dragover', e => {
            e.preventDefault();
            document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
            card.classList.add('drag-over');
        });
        card.addEventListener('drop', e => {
            e.preventDefault();
            const targetIndex = parseInt(card.dataset.index);
            if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
            const [moved] = appData.entries.splice(dragSrcIndex, 1);
            appData.entries.splice(targetIndex, 0, moved);
            saveData();
            renderCards();
        });
    });
}

// ===== コピー / トースト =====
function copyPassword(id) {
    const entry = appData.entries.find(e => e.id === id);
    if (!entry) return;
    navigator.clipboard.writeText(entry.password).then(() => {
        showToast(entry.name + " のパスワードをコピーしました");
    });
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1800);
}

// ===== 初期化 =====
window.onload = () => { buildDots(); renderCards(); };
</script>
</body>
</html>
